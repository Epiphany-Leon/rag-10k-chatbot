# Light base; the in-app Theme toggle injects a dark palette on demand.
[theme]
base = "light"
primaryColor = "#6d4dff"          # violet accent (Cherry-Studio vibe)
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f3f3f6"
textColor = "#1b1c20"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false
