# Reverse proxy: port 80 -> Streamlit on 127.0.0.1:8501.
# Copy to /etc/nginx/sites-available/ragstudio and symlink into sites-enabled.
server {
    listen 80;
    server_name __DOMAIN_OR_IP__;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Streamlit needs this for live updates).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
